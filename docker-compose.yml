services:
  postgres:
    image: postgres:16-alpine
    container_name: akyuu-postgres
    environment:
      POSTGRES_DB: akyuu
      POSTGRES_USER: akyuu
      POSTGRES_PASSWORD: akyuu
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: akyuu-redis
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
